name: Deploy Godot Web Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      - name: Build Web Export
        run: |
          mkdir -p godot/build/web
          cd godot
          godot --headless --export-release "Web" build/web/index.html

      - name: Prepare Pages
        run: |
          mkdir -p _site
          # Copy Godot web build
          cp -r godot/build/web/* _site/
          # Also keep the HTML prototype accessible at /prototype/
          mkdir -p _site/prototype
          cp index.html _site/prototype/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
